<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Pozvánka</title>
<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
}

.card {
    background: rgba(255,255,255,0.85);
    padding: 30px;
    border-radius: 20px;
    max-width: 400px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

img {
    width: 100%;
    border-radius: 15px;
    margin-bottom: 20px;
}

h1 {
    margin-bottom: 10px;
}

.text {
    margin: 10px 0;
    font-size: 16px;
}

.footer {
    margin-top: 25px;
    font-style: italic;
    opacity: 0.7;
    font-size: 14px;
}
</style>
</head>
<body>

<div class="card">

    <img src="fotka.jpg" alt="my">

    <h1>💌 Pozvánka na víkend</h1>

    <div class="text"><strong>pro čičin the bejby</strong></div>

    <div class="text">📍 místo: <strong>tajné</strong></div>

    <div class="text">🎒 sbal si:</div>
    <div class="text">
        3 kožíšky – formální, méně formální,<br>
        vycházkové a plavecké micinkovité oblečení 😄
    </div>

    <div class="footer">
        papa nibleška 💕<br>
        <span style="font-size:12px; opacity:0.6;">GitHub projektant</span>
    </div>

</div>

</body>
</html>
